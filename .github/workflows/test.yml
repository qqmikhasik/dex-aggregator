name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Check formatting
        run: forge fmt --check

      - name: Build (with --sizes)
        run: forge build --sizes

      - name: Run unit + library + fuzz tests
        # Fork tests require SEPOLIA_RPC_URL; excluded here.
        run: forge test --no-match-contract DexAggregatorForkTest -vvv

      - name: Gas report
        run: forge test --no-match-contract DexAggregatorForkTest --gas-report > gas-report.txt

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: gas-report.txt
